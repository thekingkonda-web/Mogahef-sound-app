<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الإدارة المالية</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, sans-serif; padding-bottom: 50px; }
        .admin-header { background: #2c3e50; color: white; padding: 20px; border-radius: 0 0 20px 20px; margin-bottom: 30px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .card { border: none; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .btn-save { background-color: #27ae60; color: white; font-weight: bold; border-radius: 10px; }
        .text-remaining { color: #e74c3c; font-weight: bold; }
        .location-tag { color: #2980b9; font-size: 0.85rem; }
    </style>
</head>
<body>

<div class="admin-header d-flex justify-content-between align-items-center">
    <h4 class="mb-0"><i class="fas fa-user-shield me-2"></i> لوحة تحكم الإدارة</h4>
    <a href="index.html" class="btn btn-outline-light btn-sm"><i class="fas fa-sign-out-alt"></i> خروج</a>
</div>

<div class="container">
    <div class="card p-4 mb-4">
        <h5 class="mb-4 text-primary border-bottom pb-2"><i class="fas fa-plus-circle"></i> تسجيل حجز مؤكد</h5>
        <form id="adminBookingForm" class="row g-3">
            <div class="col-md-4 col-12">
                <label class="form-label fw-bold">اسم العميل</label>
                <input type="text" id="clientName" class="form-control" placeholder="مثلاً: محمد أحمد" required>
            </div>
            <div class="col-md-4 col-6">
                <label class="form-label fw-bold">الخدمة</label>
                <select id="serviceType" class="form-select">
                    <option value="ساوند سستم">ساوند سستم</option>
                    <option value="تصوير فيديو">تصوير فيديو</option>
                    <option value="صوت وتصوير">صوت وتصوير</option>
                </select>
            </div>
            <div class="col-md-4 col-6">
                <label class="form-label fw-bold">التاريخ</label>
                <input type="date" id="eventDate" class="form-control" required>
            </div>
            <div class="col-md-12 col-12">
                <label class="form-label fw-bold">مكان المناسبة (القاعة أو العنوان)</label>
                <input type="text" id="eventLocation" class="form-control" placeholder="أدخل الموقع بالتفصيل" required>
            </div>
            <div class="col-md-6 col-6">
                <label class="form-label fw-bold text-success">المبلغ الإجمالي</label>
                <input type="number" id="totalAmount" class="form-control" placeholder="0" required>
            </div>
            <div class="col-md-6 col-6">
                <label class="form-label fw-bold text-primary">المبلغ المدفوع (عربون)</label>
                <input type="number" id="paidAmount" class="form-control" placeholder="0" required>
            </div>
            <div class="col-12 mt-4">
                <button type="submit" class="btn btn-save w-100 py-2 shadow-sm">حفظ الحجز المالي</button>
            </div>
        </form>
    </div>

    <div class="card p-3 shadow-sm">
        <h5 class="mb-4 text-secondary"><i class="fas fa-money-bill-wave me-2"></i> سجل الحسابات والحجوزات</h5>
        <div class="table-responsive">
            <table class="table table-hover align-middle text-center">
                <thead class="table-dark">
                    <tr>
                        <th>العميل/التاريخ</th>
                        <th>الخدمة والموقع</th>
                        <th>الإجمالي</th>
                        <th>المتبقي</th>
                        <th>إجراء</th>
                    </tr>
                </thead>
                <tbody id="adminTableBody">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // --- ضع بيانات Firebase الخاصة بك هنا (نفس التي في index) ---
    const firebaseConfig = {
  apiKey: "AIzaSyAKwgSqT8Aic3zk5GvliH7YJgX4POD_l8o",
  authDomain: "soundsystemapp.firebaseapp.com",
  projectId: "soundsystemapp",
  storageBucket: "soundsystemapp.firebasestorage.app",
  messagingSenderId: "296950691934",
  appId: "1:296950691934:web:ad5838b7ca9e38ec3bdccf",
  measurementId: "G-PLMFR6LLB1"
};

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // دالة حفظ الحجز
    document.getElementById('adminBookingForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const total = parseFloat(document.getElementById('totalAmount').value);
        const paid = parseFloat(document.getElementById('paidAmount').value);

        try {
            await addDoc(collection(db, "bookings"), {
                client: document.getElementById('clientName').value,
                service: document.getElementById('serviceType').value,
                date: document.getElementById('eventDate').value,
                location: document.getElementById('eventLocation').value,
                total: total,
                paid: paid,
                remaining: total - paid,
                createdAt: new Date()
            });
            alert("تم تسجيل الحجز بنجاح ✅");
            location.reload();
        } catch (error) { alert("حدث خطأ في الاتصال!"); }
    });

    // دالة تحميل البيانات
    async function loadAdminData() {
        const tableBody = document.getElementById('adminTableBody');
        const q = query(collection(db, "bookings"), orderBy("date", "asc"));
        const querySnapshot = await getDocs(q);
        
        tableBody.innerHTML = "";
        querySnapshot.forEach((res) => {
            const data = res.data();
            const id = res.id;
            tableBody.innerHTML += `
                <tr>
                    <td><strong>${data.client}</strong><br><small class="text-muted">${data.date}</small></td>
                    <td>
                        <span class="badge bg-secondary mb-1">${data.service}</span><br>
                        <small class="location-tag"><i class="fas fa-map-marker-alt"></i> ${data.location}</small>
                    </td>
                    <td>${data.total}</td>
                    <td class="text-remaining">${data.remaining}</td>
                    <td>
                        <button onclick="deleteBooking('${id}')" class="btn btn-sm text-danger"><i class="fas fa-trash-alt"></i></button>
                    </td>
                </tr>
            `;
        });
    }

    window.deleteBooking = async (id) => {
        if(confirm("هل أنت متأكد من حذف هذا الحجز نهائياً؟")) {
            await deleteDoc(doc(db, "bookings", id));
            location.reload();
        }
    }

    loadAdminData();
</script>
</body>
</html>
