<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الإدارة - التحكم الكامل</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .admin-header { background: #2c3e50; color: white; padding: 20px; border-radius: 15px; margin-bottom: 25px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .card { border: none; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); margin-bottom: 20px; }
        .text-remaining { color: #e74c3c; font-weight: bold; }
        .time-group { background: #fff5f5; padding: 10px; border-radius: 10px; border: 1px dashed #fab1a0; }
    </style>
</head>
<body>

<div class="admin-header d-flex justify-content-between align-items-center">
    <h4 class="mb-0"><i class="fas fa-user-shield me-2"></i> لوحة الإدارة المالية والحجوزات</h4>
    <a href="index.html" class="btn btn-outline-light btn-sm"><i class="fas fa-home"></i> العودة للواجهة</a>
</div>

<div class="container">
    <div class="card p-4">
        <h5 class="mb-4 text-primary border-bottom pb-2"><i class="fas fa-plus-circle"></i> إضافة حجز جديد</h5>
        <form id="adminForm" class="row g-3">
            <div class="col-md-4">
                <label class="form-label fw-bold">اسم العميل</label>
                <input type="text" id="cName" class="form-control" placeholder="اسم العميل" required>
            </div>
            <div class="col-md-4 col-6">
                <label class="form-label fw-bold">التاريخ</label>
                <input type="date" id="cDate" class="form-control" required>
            </div>
            <div class="col-md-4 col-6">
                <label class="form-label fw-bold">نوع الخدمة</label>
                <select id="cServ" class="form-select">
                    <option>ساوند سستم</option>
                    <option>تصوير فوتوغرافي</option>
                    <option>تصوير فيديو</option>
                    <option>عرض شاشات</option>
                </select>
            </div>

            <div class="col-md-6">
                <div class="time-group row g-2">
                    <div class="col-6">
                        <label class="form-label fw-bold text-danger small">من الساعة (بداية)</label>
                        <input type="time" id="startTime" class="form-control" required>
                    </div>
                    <div class="col-6">
                        <label class="form-label fw-bold text-danger small">إلى الساعة (نهاية)</label>
                        <input type="time" id="endTime" class="form-control" required>
                    </div>
                </div>
            </div>

            <div class="col-md-6">
                <label class="form-label fw-bold">موقع المناسبة</label>
                <input type="text" id="cLoc" class="form-control" placeholder="القاعة أو العنوان" required>
            </div>

            <div class="col-md-6 col-6">
                <label class="form-label fw-bold text-success">المبلغ الإجمالي</label>
                <input type="number" id="cTotal" class="form-control" placeholder="0" required>
            </div>
            <div class="col-md-6 col-6">
                <label class="form-label fw-bold text-primary">العربون المدفوع</label>
                <input type="number" id="cPaid" class="form-control" placeholder="0" required>
            </div>

            <div class="col-12 mt-4">
                <button type="submit" class="btn btn-primary w-100 py-2 fw-bold shadow">حفظ البيانات ونشرها في الجدول العام</button>
            </div>
        </form>
    </div>

    <div class="card p-3 shadow-sm">
        <h5 class="mb-3 text-secondary"><i class="fas fa-list-ul me-2"></i> سجل البيانات المالي</h5>
        <div class="table-responsive">
            <table class="table table-hover align-middle text-center">
                <thead class="table-dark">
                    <tr>
                        <th>العميل/التاريخ</th>
                        <th>التوقيت والموقع</th>
                        <th>الحساب المالي</th>
                        <th>حذف</th>
                    </tr>
                </thead>
                <tbody id="adminDataTable">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // --- ضع بيانات Firebase الخاصة بك هنا (نفس التي في صفحة index) ---
    const firebaseConfig = {
  apiKey: "AIzaSyAKwgSqT8Aic3zk5GvliH7YJgX4POD_l8o",
  authDomain: "soundsystemapp.firebaseapp.com",
  projectId: "soundsystemapp",
  storageBucket: "soundsystemapp.firebasestorage.app",
  messagingSenderId: "296950691934",
  appId: "1:296950691934:web:ad5838b7ca9e38ec3bdccf",
  measurementId: "G-PLMFR6LLB1"
};
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // دالة حفظ الحجز
    document.getElementById('adminForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        // دمج الساعات قبل الحفظ
        const start = document.getElementById('startTime').value;
        const end = document.getElementById('endTime').value;
        const fullTimeStr = "من " + start + " إلى " + end;

        const total = parseFloat(document.getElementById('cTotal').value);
        const paid = parseFloat(document.getElementById('cPaid').value);

        try {
            await addDoc(collection(db, "bookings"), {
                client: document.getElementById('cName').value,
                date: document.getElementById('cDate').value,
                timeRange: fullTimeStr,
                location: document.getElementById('cLoc').value,
                service: document.getElementById('cServ').value,
                total: total,
                paid: paid,
                remaining: total - paid,
                createdAt: new Date()
            });
            alert("تم تسجيل الحجز بنجاح ✅");
            location.reload();
        } catch (error) {
            alert("حدث خطأ في الاتصال بالقاعدة!");
        }
    });

    // دالة عرض الجدول الخاص بك
    async function loadTable() {
        const tableBody = document.getElementById('adminDataTable');
        const q = query(collection(db, "bookings"), orderBy("date", "asc"));
        const snap = await getDocs(q);
        
        tableBody.innerHTML = "";
        snap.forEach((res) => {
            const d = res.data();
            const id = res.id;
            tableBody.innerHTML += `
                <tr>
                    <td><strong>${d.client}</strong><br><small class="text-muted">${d.date}</small></td>
                    <td><small>${d.location}</small><br><span class="badge bg-warning text-dark">${d.timeRange}</span></td>
                    <td>
                       <small>إجمالي: ${d.total}</small><br>
                       <span class="text-remaining">متبقي: ${d.remaining}</span>
                    </td>
                    <td>
                        <button onclick="delDoc('${id}')" class="btn btn-link text-danger p-0"><i class="fas fa-trash-alt"></i></button>
                    </td>
                </tr>
            `;
        });
    }

    // دالة الحذف
    window.delDoc = async (id) => {
        if(confirm("هل أنت متأكد من حذف هذا الحجز نهائياً؟")) {
            await deleteDoc(doc(db, "bookings", id));
            location.reload();
        }
    }

    // تشغيل التحميل عند الفتح
    loadTable();
</script>

</body>
</html>
