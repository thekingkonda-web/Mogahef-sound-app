<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقغ صورة وصوت لارتبطات الساوند و التصوير- الرئيسية</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding-bottom: 20px; }
        
        /* قسم الرأس */
        .hero-section { 
            background: white; 
            padding: 30px 15px; 
            border-bottom: 1px solid #ddd;
            text-align: center; 
            margin-bottom: 20px;
        }

        .logo-container {
            width: 110px; height: 110px; margin: 0 auto 15px;
            border-radius: 50%; overflow: hidden;
            border: 3px solid #0866ff; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .logo-container img { width: 100%; height: 100%; object-fit: cover; }

        .animated-text { 
            font-size: 1.5rem; font-weight: bold; height: 40px; 
            overflow: hidden; margin: 15px 0; position: relative;
        }
        .animated-text span { display: block; animation: slide 6s infinite; }
        .t1 { color: #0866ff; } .t2 { color: #f33e58; } .t3 { color: #42b72a; }

        @keyframes slide {
            0%, 20% { transform: translateY(0); }
            33%, 53% { transform: translateY(-40px); }
            66%, 86% { transform: translateY(-80px); }
            100% { transform: translateY(0); }
        }

        .fb-btn-group { display: flex; gap: 10px; max-width: 500px; margin: 0 auto; padding: 0 10px; }
        .fb-btn { 
            flex: 1; border: none; border-radius: 8px; padding: 12px; 
            font-weight: bold; text-decoration: none; display: flex; 
            align-items: center; justify-content: center; gap: 8px; 
        }
        .btn-blue { background: #0866ff; color: white !important; }
        .btn-gray { background: #e4e6eb; color: #050505 !important; }

        .fb-post-card {
            background: white; border-radius: 10px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.2);
            max-width: 600px; margin: 0 auto; padding: 15px;
        }
        .post-header { border-bottom: 1px solid #f0f2f5; padding-bottom: 10px; margin-bottom: 15px; font-weight: bold; color: #65676b; }
        .time-tag { color: #d32f2f; font-size: 0.75rem; font-weight: 600; display: block; margin-top: 2px; }

        /* تنسيق التذييل الجديد (Footer) */
        footer {
            text-align: center;
            margin-top: 40px;
            padding: 20px;
            background: white;
            border-top: 1px solid #ddd;
        }
        .social-links { display: flex; justify-content: center; gap: 20px; margin-bottom: 15px; }
        .social-links a { font-size: 2rem; transition: 0.3s; }
        .fa-facebook { color: #1877F2; }
        .fa-instagram { color: #E4405F; }
        .social-links a:hover { transform: scale(1.1); opacity: 0.8; }
        .copyright { color: #65676b; font-size: 0.9rem; font-weight: 500; }
    </style>
</head>
<body>

<div class="hero-section">
    <div class="logo-container">
        <img src="logos.png" alt="Logo">
    </div>
    <h2 class="fw-bold" style="color: #050505;">صورة و صوت </h2>
    
    <div class="animated-text">
        <span class="t1">نقدم أفضل خدمات الساوند سستم 🔊</span>
        <span class="t2">تصوير فوتوغرافي وفيديو احترافي 📸</span>
        <span class="t3">نسعد بخدمتكم في جميع مناسباتكم ✨</span>
    </div>

    <div class="fb-btn-group">
        <a href="booking.html" class="fb-btn btn-blue shadow-sm">
            <i class="fas fa-plus-circle"></i> حجز تصوير ساوند
        </a>
        <button onclick="goToAdmin()" class="fb-btn btn-gray shadow-sm">
            <i class="fas fa-user-shield"></i>صفحة المدير 
        </button>
    </div>
</div>

<div class="container px-2">
    <div class="fb-post-card">
        <div class="post-header"><i class="fas fa-calendar-alt me-2 text-primary"></i> جدول المواعيد والارتباطات</div>
        <div class="table-responsive">
            <table class="table table-borderless text-center align-middle">
                <thead>
                    <tr class="text-secondary small border-bottom">
                        <th class="pb-2">التاريخ والزمن</th>
                        <th class="pb-2">الخدمة</th>
                        <th class="pb-2">الموقع</th>
                    </tr>
                </thead>
                <tbody id="publicTable"></tbody>
            </table>
        </div>
    </div>
</div>

<footer>
    <div class="social-links">تواصلو معنا عبر. صفحاتها 
        <a href="https://www.facebook.com/profile.php?id=61572048745289" target="_blank">
            <i class="fab fa-facebook"></i>
        </a>
        <a href="https://www.instagram.com/swr.wswt?igsh=MTFiYzN2anJ2cDdmeg==" target="_blank">
            <i class="fab fa-instagram"></i>
        </a>
    </div>
    <div class="copyright">
        &copy;  جميع الحقوق محفوظة لموقع صورة وصوت
    </div>
</footer>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
  apiKey: "AIzaSyAKwgSqT8Aic3zk5GvliH7YJgX4POD_l8o",
  authDomain: "soundsystemapp.firebaseapp.com",
  projectId: "soundsystemapp",
  storageBucket: "soundsystemapp.firebasestorage.app",
  messagingSenderId: "296950691934",
  appId: "1:296950691934:web:ad5838b7ca9e38ec3bdccf",
  measurementId: "G-PLMFR6LLB1"
};

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    async function loadPublicData() {
        const tableBody = document.getElementById('publicTable');
        const q = query(collection(db, "bookings"), orderBy("date", "asc"));
        try {
            const querySnapshot = await getDocs(q);
            tableBody.innerHTML = "";
            if (querySnapshot.empty) {
                tableBody.innerHTML = "<tr><td colspan='3' class='py-4 text-muted'>لا توجد مواعيد حالياً</td></tr>";
                return;
            }
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                tableBody.innerHTML += `
                    <tr style="border-bottom: 1px solid #f0f2f5;">
                        <td class="py-3">
                            <div class="fw-bold" style="color: #050505; font-size: 0.95rem;">${data.date}</div>
                            <div class="time-tag"><i class="far fa-clock"></i> ${data.timeRange || 'طوال اليوم'}</div>
                        </td>
                        <td class="text-primary fw-bold">${data.service}</td>
                        <td><small class="text-muted"><i class="fas fa-map-marker-alt"></i> ${data.location}</small></td>
                    </tr>`;
            });
        } catch (e) { console.error(e); }
    }

    window.goToAdmin = () => {
        const pass = prompt("الرمز السري:");
        if(pass === "123") window.location.href = "admin_panel.html";
        else if(pass !== null) alert("خطأ!");
    }
    loadPublicData();
</script>

</body>
</html>
