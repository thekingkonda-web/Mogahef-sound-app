<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>واجهة الخدمات التقنية - الجدول العام</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
   <style>
    body { background-color: #f0f2f5; font-family: 'Segoe UI', Tahoma, sans-serif; }
    .hero-section { 
        background: white; 
        padding: 50px 20px; 
        border-bottom-left-radius: 40px; 
        border-bottom-right-radius: 40px; 
        box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
        text-align: center; 
    }

    /* تنسيق اللوجو الجديد */
    .logo-container {
        width: 120px;
        height: 120px;
        margin: 0 auto 20px;
        border-radius: 50%;
        overflow: hidden;
        border: 4px solid #0078ff;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    .logo-container img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    /* تنسيق النصوص المتحركة الملونة */
    .animated-text { 
        font-size: 1.5rem; /* تكبير الخط */
        font-weight: bold;
        height: 40px; /* زيادة المساحة */
        overflow: hidden; 
        position: relative;
        margin-top: 15px;
    }
    .animated-text span { 
        display: block; 
        animation: slide 6s infinite; 
    }

    /* ألوان مختلفة لكل جملة */
    .text-1 { color: #0078ff; } /* أزرق */
    .text-2 { color: #e91e63; } /* وردي محمر */
    .text-3 { color: #42b72a; } /* أخضر */

    @keyframes slide {
        0%, 20% { transform: translateY(0); }
        33%, 53% { transform: translateY(-40px); }
        66%, 86% { transform: translateY(-80px); }
        100% { transform: translateY(0); }
    }
</style>
</head>
<body>

<div class="hero-section">
    <div class="logo-placeholder">
        <i class="fas fa-bolt"></i> </div>
    <h2 class="fw-bold text-dark">صورة و صوت </h2> 
    
    <div class="animated-text mt-2">
        <span>نقدم خدمات الساوند سستم الاحترافية</span>
        <span>تصوير فوتوغرافي وفيديو بجودة عالية</span>
        <span>تنظيم الإضاءة والصوت لجميع المناسبات</span>
    </div>

    <div class="main-buttons container">
        <a href="booking.html" class="btn-custom btn-booking shadow">
            <i class="fas fa-calendar-plus"></i> حجز جديد
        </a>
        <button onclick="goToAdmin()" class="btn-custom btn-admin shadow">
            <i class="fas fa-user-shield"></i> الإدارة
        </button>
    </div>
</div>

<div class="container public-table-section">
    <h5 class="mb-4 text-secondary text-center fw-bold"><i class="fas fa-calendar-alt me-2"></i> جدول المواعيد والارتباطات</h5>
    <div class="card card-table overflow-hidden">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0 text-center">
                <thead class="table-primary">
                    <tr>
                        <th class="py-3">اليوم والزمن</th>
                        <th class="py-3">الخدمة</th>
                        <th class="py-3">الموقع</th>
                    </tr>
                </thead>
                <tbody id="publicTable">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // --- ضع بيانات Firebase الخاصة بك هنا ---
    const firebaseConfig = {
  apiKey: "AIzaSyAKwgSqT8Aic3zk5GvliH7YJgX4POD_l8o",
  authDomain: "soundsystemapp.firebaseapp.com",
  projectId: "soundsystemapp",
  storageBucket: "soundsystemapp.firebasestorage.app",
  messagingSenderId: "296950691934",
  appId: "1:296950691934:web:ad5838b7ca9e38ec3bdccf",
  measurementId: "G-PLMFR6LLB1"
};

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    async function loadPublicData() {
        const tableBody = document.getElementById('publicTable');
        const q = query(collection(db, "bookings"), orderBy("date", "asc"));
        
        try {
            const querySnapshot = await getDocs(q);
            tableBody.innerHTML = "";
            
            if (querySnapshot.empty) {
                tableBody.innerHTML = "<tr><td colspan='3' class='py-4 text-muted'>لا توجد مواعيد محجوزة حالياً</td></tr>";
                return;
            }

            querySnapshot.forEach((doc) => {
                const data = doc.data();
                tableBody.innerHTML += `
                    <tr>
                        <td class="py-3">
                            <span class="badge bg-light text-dark border badge-date">${data.date}</span>
                            <span class="time-info">
                                <i class="far fa-clock me-1"></i> 
                                ${data.timeRange ? data.timeRange : 'كامل اليوم'}
                            </span>
                        </td>
                        <td class="fw-bold text-primary">${data.service}</td>
                        <td><small class="text-secondary"><i class="fas fa-map-marker-alt"></i> ${data.location}</small></td>
                    </tr>
                `;
            });
        } catch (error) {
            console.error("خطأ في جلب البيانات:", error);
        }
    }

    // دالة الانتقال لصفحة الإدارة بالرمز السري
    window.goToAdmin = () => {
        const pass = prompt("الرجاء إدخال رمز الدخول (الإدارة):");
        if(pass === "123") { // يمكنك تغيير الرمز من هنا
            window.location.href = "admin_panel.html"; 
        } else if (pass !== null) {
            alert("رمز الدخول غير صحيح!");
        }
    }

    // تشغيل الجلب التلقائي عند فتح الصفحة
    loadPublicData();
</script>

</body>
</html>
